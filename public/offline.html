
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Guard - Offline</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
      line-height: 1.6;
      color: #333;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: linear-gradient(to bottom, #f0f4ff, #dbeafe);
    }
    .container {
      max-width: 500px;
      padding: 2rem;
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #1e40af;
    }
    p {
      font-size: 1rem;
      margin-bottom: 1.5rem;
    }
    .logo {
      width: 80px;
      height: 80px;
      background-color: #3b82f6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 1.5rem;
      margin: 0 auto 2rem;
    }
    .btn {
      display: inline-block;
      background-color: #3b82f6;
      color: white;
      font-weight: 600;
      text-decoration: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.25rem;
      transition: background-color 0.3s;
    }
    .btn:hover {
      background-color: #2563eb;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background: linear-gradient(to bottom, #1e293b, #0f172a);
        color: #e2e8f0;
      }
      .container {
        background-color: #1e293b;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      }
      h1 {
        color: #60a5fa;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">LG</div>
    <h1>You're Offline</h1>
    <p>It seems you're not connected to the internet. Please check your connection and try again.</p>
    <p>Life Guard requires an internet connection to monitor your vital signs in real-time.</p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
