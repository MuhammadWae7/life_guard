
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Guard - Offline</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      background: linear-gradient(to bottom, #f8fafc, #e0f2fe);
      color: #1e293b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    .container {
      max-width: 500px;
      padding: 30px;
      background-color: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }
    h1 {
      color: #0f172a;
      margin-bottom: 16px;
    }
    p {
      color: #475569;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .logo {
      width: 80px;
      height: 80px;
      background-color: #3b82f6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 24px;
      margin: 0 auto 24px;
    }
    .button {
      background-color: #3b82f6;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: background-color 0.2s;
    }
    .button:hover {
      background-color: #2563eb;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background: linear-gradient(to bottom, #0f172a, #1e293b);
        color: #f8fafc;
      }
      .container {
        background-color: #1e293b;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
      }
      h1 {
        color: #f8fafc;
      }
      p {
        color: #cbd5e1;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">LG</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Life Guard requires an internet connection to monitor your health data in real-time.</p>
    <p>Please check your connection and try again.</p>
    <a href="/" class="button">Try Again</a>
  </div>
  <script>
    // Check if we're back online
    window.addEventListener('online', () => {
      window.location.reload();
    });
    
    // Try to reload the page when the button is clicked
    document.querySelector('.button').addEventListener('click', (e) => {
      e.preventDefault();
      window.location.reload();
    });
  </script>
</body>
</html>
